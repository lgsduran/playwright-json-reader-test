services:
  playwright-tests:
    build: . # Build from the local Dockerfile
    # To use a specific image directly, replace 'build: .' with 'image: mcr.microsoft.com/playwright:v1.58.2-noble'
    volumes:
      - ./test-results:/app/test-results # Mount the results folder to your host
    # Recommended configurations for Chromium
    ipc: host 
    # Use the 'init' flag to handle zombie processes correctly
    init: true 
    
networks:
  shortable-net:
    driver: bridge
    name: shortable-net
